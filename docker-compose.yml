services:
  model-downloader:
    image: alpine:latest
    volumes:
      - ./models:/models
    command: >
      sh -c "apk add --no-cache wget && if [ ! -f /models/Meta-Llama-3.1-8B-Instruct-Q5_K_M.gguf ]; then echo 'Downloading Llama 3.1 8B Q5_K_M (~5.7GB)...' && wget -O /models/Meta-Llama-3.1-8B-Instruct-Q5_K_M.gguf 'https://huggingface.co/bartowski/Meta-Llama-3.1-8B-Instruct-GGUF/resolve/main/Meta-Llama-3.1-8B-Instruct-Q5_K_M.gguf' && echo 'Download complete!'; else echo 'Model already exists, skipping download.'; fi"

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    depends_on:
      model-downloader:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Change --ctx-size 8192 to increase the tokens
    command: "-m /models/Meta-Llama-3.1-8B-Instruct-Q5_K_M.gguf --host 0.0.0.0 --port 8080 --ctx-size 8192 --flash-attn on -ngl 99 --threads 8"
    restart: unless-stopped
